events {}

http {
  upstream web_app {
    server web-app:3000;
  }

  upstream api_core {
    server api-core:4000;
  }

  upstream ws_gateway {
    server ws-gateway:4001;
  }

  upstream telegram_link_webhook {
    server telegram-link-webhook:4010;
  }

  upstream minio_storage {
    server minio:9000;
  }

  upstream admin_panel {
    server admin-panel:9000;
  }

  server {
    listen 80;
    server_name _;

    location ^~ /api/v1/internal/ {
      return 404;
    }

    location /s3/ {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, PUT, HEAD, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, X-Amz-Date, X-Amz-Content-Sha256, X-Amz-Security-Token, Authorization" always;
      add_header Access-Control-Expose-Headers "ETag" always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass http://minio_storage/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
    }

    location / {
      proxy_pass http://web_app;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://api_core;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
      proxy_pass http://ws_gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location /telegram/webhook {
      proxy_pass http://telegram_link_webhook;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
      proxy_pass http://admin_panel;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
