name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docs and repo metadata
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f docker-compose.yml
          test -f docs/system-blueprint.md

  api-core-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api-core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Build
        run: npm run build

  web-app-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
          API_INTERNAL_BASE_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_WS_URL: http://localhost:4001
        run: npm run build

  ws-gateway-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ws-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ws-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          JWT_ACCESS_SECRET: change_me_access
          REDIS_URL: redis://localhost:6379
          WEB_APP_ORIGINS: http://localhost:3000,http://localhost
        run: npm run build

  admin-panel-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-panel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql, pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate routes
        env:
          APP_ENV: testing
          APP_KEY: base64:ocAXRFu4tQkoouJ0sczqgCLz4welWNQbKZAQ+U7EYkQ=
          APP_URL: http://localhost/admin
        run: php artisan route:list
