# Blueprint compose for the target platform architecture.
# Application service Dockerfiles and runtime commands are expected to be added
# as implementation starts in apps/ and services/.

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web-app
      - api-core
      - ws-gateway
      - admin-panel
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - edge
      - app

  web-app:
    build:
      context: ./apps/web-app
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api/v1
      API_INTERNAL_BASE_URL: http://api-core:4000/api/v1
    depends_on:
      - api-core
    networks:
      - app

  api-core:
    build:
      context: ./apps/api-core
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PORT: 4000
      WEB_APP_ORIGIN: http://localhost:${WEB_APP_PORT:-3000}
      COOKIE_DOMAIN: localhost
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      VIDEO_ACCESS_SECRET: ${VIDEO_ACCESS_SECRET}
      SWAGGER_ENABLED: "true"
    depends_on:
      - postgres
      - redis
    networks:
      - app
      - data

  ws-gateway:
    image: node:22-alpine
    command: ["sh", "-c", "echo scaffold ws-gateway && sleep infinity"]
    working_dir: /app
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./apps/ws-gateway:/app
    depends_on:
      - redis
    networks:
      - app
      - data

  admin-panel:
    image: php:8.3-fpm-alpine
    command: ["sh", "-c", "echo scaffold admin-panel && sleep infinity"]
    working_dir: /app
    volumes:
      - ./apps/admin-panel:/app
    depends_on:
      - postgres
      - redis
    networks:
      - app
      - data

  booking-slot-worker:
    image: golang:1.24-alpine
    command: ["sh", "-c", "echo scaffold booking-slot-worker && sleep infinity"]
    working_dir: /app
    volumes:
      - ./services/booking-slot-worker:/app
    depends_on:
      - postgres
      - redis
    networks:
      - app
      - data

  notification-worker:
    image: golang:1.24-alpine
    command: ["sh", "-c", "echo scaffold notification-worker && sleep infinity"]
    working_dir: /app
    volumes:
      - ./services/notification-worker:/app
    depends_on:
      - postgres
      - redis
    networks:
      - app
      - data

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - data

  minio:
    image: minio/minio:RELEASE.2026-01-03T00-00-00Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - data

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  edge:
  app:
  data:
    internal: true
