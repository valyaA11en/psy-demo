# Compose stack for the current demo platform.
# Go workers remain scaffold placeholders; web, api, ws, and admin are runnable.

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web-app
      - api-core
      - ws-gateway
      - admin-panel
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - edge
      - app

  web-app:
    build:
      context: ./apps/web-app
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost
      API_INTERNAL_BASE_URL: http://api-core:4000/api/v1
    depends_on:
      - api-core
      - ws-gateway
    networks:
      - app

  api-core:
    build:
      context: ./apps/api-core
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PORT: 4000
      WEB_APP_ORIGIN: http://localhost:${WEB_APP_PORT:-3000}
      WEB_APP_ORIGINS: http://localhost:${WEB_APP_PORT:-3000},http://localhost
      COOKIE_DOMAIN: localhost
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      VIDEO_ACCESS_SECRET: ${VIDEO_ACCESS_SECRET}
      SWAGGER_ENABLED: "true"
    depends_on:
      - postgres
      - redis
    networks:
      - app
      - data

  ws-gateway:
    build:
      context: ./apps/ws-gateway
      dockerfile: Dockerfile
    environment:
      PORT: 4001
      WEB_APP_ORIGINS: http://localhost:${WEB_APP_PORT:-3000},http://localhost
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      REDIS_URL: redis://redis:6379
      REALTIME_REDIS_CHANNEL: consultations.realtime.v1
      WS_PATH: /ws/socket.io
    depends_on:
      - redis
    networks:
      - app
      - data

  admin-panel:
    build:
      context: ./apps/admin-panel
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${ADMIN_APP_KEY}
      APP_URL: http://localhost/admin
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_DRIVER: file
      SESSION_SECURE_COOKIE: "false"
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      - postgres
      - redis
    networks:
      - app
      - data

  booking-slot-worker:
    image: golang:1.24-alpine
    command: ["sh", "-c", "echo scaffold booking-slot-worker && sleep infinity"]
    working_dir: /app
    volumes:
      - ./services/booking-slot-worker:/app
    depends_on:
      - postgres
      - redis
    networks:
      - app
      - data

  notification-worker:
    image: golang:1.24-alpine
    command: ["sh", "-c", "echo scaffold notification-worker && sleep infinity"]
    working_dir: /app
    volumes:
      - ./services/notification-worker:/app
    depends_on:
      - postgres
      - redis
    networks:
      - app
      - data

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - data

  minio:
    image: minio/minio:RELEASE.2026-01-03T00-00-00Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - data

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  edge:
  app:
  data:
    internal: true
